{% extends "authenticated-base.html" %}

{% block additional_styles %}
<style>
    #map { 
        height: 60vh; 
        width: 60vh;
    }
</style>
{% endblock %}



{% block external_js %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
<script>
    var map = L.map('map').setView([10.45, -61.35], 9.4);
    var wmsLayer = L.tileLayer.wms('https://geoserver.sundaebytestt.com/geoserver/wms', {
        layers: 'osm:osm_nohouse'
    }).addTo(map);
    const signs = {{signs | tojson}}

    for(let sign of signs){
        L.marker([sign.latitude, sign.longitude]).addTo(map);
    }
</script>
{% endblock %}


{% block subpage_content %}
    
    <div id="carousel" class="carousel slide mx-auto" style="max-height: 50vh; max-width: 100vh;">
        <div class="carousel-inner" style="height: 50vh; width: 100vh; background-color: #111;">
            {% for sign in signs %}
                <div class="carousel-item {% if loop.first %} active {% endif %} h-100">
                    <img src="/media/sign_pics/{{sign.file_name}}" 
                        class="d-block mx-auto h-100" 
                        style="object-fit: contain; width: auto;" 
                        alt="{{sign.description}}">
                </div>
            {% endfor %}
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>
    <div id="map" class="mx-auto"></div>

{% endblock %}
