<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login with EG</title>
    
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
   
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scrollbar-width: none;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .slideshow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(139, 30, 30, 0.75) 0%, rgba(107, 21, 16, 0.85) 100%);
            z-index: -1;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-card {
            border: none;
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            background: transparent;
            max-width: 450px;
            width: 100%;
            backdrop-filter: blur(2px);
        }

        .card-inner {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 48px;
            padding: 40px 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, #99120b, #520c01);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: #FFF8DC;
            font-family: 'Montserrat', sans-serif;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: center;
            margin: 0 auto;
        }

        .logo:hover {
         transform: translateY(-2px);
                    }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            color: #2d2a24;
            letter-spacing: -0.5px;
        }

        .logo img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            align-self: center;
            transform: translateY(5px);
        }


        .logo-section h2 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 28px;
            color: #2d2a24;
            margin-bottom: 8px;
        }

        .logo-section p {
            font-size: 14px;
            color: #7a6a5a;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            color: #4a3a34;
            margin-bottom: 8px;
        }

        .input-group-custom {
            position: relative;
        }

        .input-group-custom input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 60px;
            border: 1.5px solid #e8d8c8;
            font-family: 'Open Sans', sans-serif;
            font-size: 14px;
            transition: all 0.2s ease;
            background: white;
        }

        .input-group-custom input:focus {
            outline: none;
            border-color: #b04535;
            box-shadow: 0 0 0 3px rgba(176, 69, 53, 0.1);
        }

        
        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #6a5a4a;
            cursor: pointer;
        }

        .remember-me input {
            cursor: pointer;
        }

        .forgot-link {
            color: #b04535;
            text-decoration: none;
            font-weight: 600;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        
        .login-btn {
            background: #b04535;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 14px;
            font-weight: 700;
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
            width: 100%;
            transition: all 0.2s ease;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .login-btn:hover {
            background: #8B1E1E;
            transform: translateY(-2px);
        }

       
        .register-link {
            text-align: center;
            font-size: 14px;
            color: #6a5a4a;
        }

        .register-link a {
            color: #b04535;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        hr {
            border-color: #f0e2d0;
            margin: 24px 0;
        }

        .toast-container {
            z-index: 9999;
        }

        @media (max-width: 576px) {
            .card-inner {
                padding: 32px 24px;
            }
            .logo-icon {
                width: 50px;
                height: 50px;
                font-size: 22px;
            }
            .logo-section h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

   
    <div class="slideshow-container" id="slideshowContainer"></div>
    <div class="overlay"></div>

   
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="appToast" class="toast" role="alert">
            <div class="toast-header">
                <strong id="toastTitle">Notification</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastContent"></div>
        </div>
    </div>

    
    <div class="login-container">
        <div class="login-card">
            <div class="card-inner">
                <div class="logo-section">

                    <div class="logo">
                 <img src="/static/img/logo (yellow).png" alt="Logo">
            </div>
            
                    <h2>Welcome Back!</h2>
                    <p>Sign in to see your progress</p>
                </div>

                <form id="loginForm" method="POST">
                    <div class="form-group">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-group-custom">
                            <input type="text" id="username" name="username" placeholder="Enter your email or username" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group-custom"> 
                            <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        </div>
                    </div>

                    <button type="submit" class="login-btn">Sign In</button>

                    <div class="register-link">
                        Don't have an account? <a href="/register">Create Account</a>
                    </div>

                    <hr>

                    <div class="register-link">
                        <small>By signing in, you'll be signed in</small>
                    </div>
                </form>
            </div>
        </div>
    </div>

    html
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>

    const backgroundImages = [
        "/static/img/beach bg.jpeg",
        "/static/img/beach 2 bg.jpeg",
        "/static/img/land bg.jpeg",
        "/static/img/road.jpeg"
    ];

    let currentSlide = 0;
    let slideInterval;

    function initSlideshow() {
        const container = document.getElementById('slideshowContainer');
        if (!container) return;
        
        container.innerHTML = '';
        
        backgroundImages.forEach((imgUrl, index) => {
            const slide = document.createElement('div');
            slide.className = 'slide';
            if (index === 0) slide.classList.add('active');
            slide.style.backgroundImage = `url('${imgUrl}')`;
            slide.style.backgroundSize = 'cover';
            slide.style.backgroundPosition = 'center';
            slide.style.backgroundRepeat = 'no-repeat';
            container.appendChild(slide);
        });
        
        startSlideshow();
    }

    function startSlideshow() {
        if (slideInterval) clearInterval(slideInterval);
        
        slideInterval = setInterval(() => {
            const slides = document.querySelectorAll('.slide');
            if (slides.length === 0) return;
            
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 4000);
    }

    
    function showToast(message, title = 'Notice') {
        const toastEl = document.getElementById('appToast');
        const toastTitle = document.getElementById('toastTitle');
        const toastContent = document.getElementById('toastContent');
        
        if (!toastEl) return;
        
        toastTitle.textContent = title;
        toastContent.textContent = message;
        
        const toast = new bootstrap.Toast(toastEl, { delay: 3000 });
        toast.show();
    }


    // Load saved username if exists
    const savedUsername = localStorage.getItem('savedUsername');
    const usernameField = document.getElementById('username');
    if (savedUsername && usernameField) {
        usernameField.value = savedUsername;
        const rememberMe = document.getElementById('rememberMe');
        if (rememberMe) rememberMe.checked = true;
    }

    
    document.addEventListener('DOMContentLoaded', function() {
        initSlideshow();
    });
</script>
</body>
</html>
